<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ภัทรา Homemade ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Mitr', sans-serif; background-color: #F8FAFC; }</style>
</head>
<body class="text-slate-800 hidden" id="admin-body">
    <nav class="bg-white border-b border-slate-200 shadow-sm px-4 py-4 sticky top-0 z-20">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-slate-800 text-white p-2 rounded-lg"><i data-lucide="layout-dashboard" class="w-5 h-5"></i></div>
                <h1 class="text-lg font-bold">คลังสินค้า (Cloud Database)</h1>
            </div>
            <div class="flex gap-2">
                <a href="index.html" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2"><i data-lucide="store" class="w-4 h-4"></i> หน้าร้าน</a>
                <button onclick="window.logout()" class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl text-sm font-medium flex items-center gap-2"><i data-lucide="log-out" class="w-4 h-4"></i> ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm h-fit">
            <h3 id="form-title" class="text-base font-bold mb-4 flex items-center gap-2"><i data-lucide="cloud-upload" class="text-blue-500"></i> อัปโหลดสินค้าขึ้น Cloud</h3>
            <form onsubmit="window.saveProduct(event)" id="product-form" class="space-y-4">
                <input type="hidden" id="prod-id">
                <input type="hidden" id="current-img-url">

                <div>
                    <label class="block text-xs font-medium mb-1">ชื่อสินค้า *</label>
                    <input type="text" id="prod-name" required class="w-full border rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium mb-1">ราคา (บาท) *</label>
                    <input type="number" id="prod-price" required min="0" class="w-full border rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-blue-400">
                </div>

                <!-- อัปโหลดรูปจากเครื่อง -->
                <div>
                    <label class="block text-xs font-medium mb-1">รูปภาพสินค้า *</label>
                    <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                        <div class="flex flex-col items-center justify-center gap-1">
                            <i data-lucide="image-plus" class="w-7 h-7 text-slate-400"></i>
                            <span class="text-xs text-slate-500">คลิกเพื่อเลือกรูปจากเครื่อง</span>
                            <span class="text-xs text-slate-400">PNG, JPG, WEBP</span>
                        </div>
                        <input type="file" id="prod-img-file" accept="image/*" class="hidden" onchange="window.previewImage(event)">
                    </label>
                    <!-- Preview -->
                    <img id="img-preview" src="" class="hidden mt-3 w-full h-40 object-cover rounded-xl border border-slate-200">
                    <!-- Progress Bar -->
                    <div id="upload-progress" class="hidden mt-2">
                        <div class="w-full bg-slate-100 rounded-full h-5 overflow-hidden">
                            <div id="progress-fill" class="bg-blue-500 h-5 rounded-full text-xs text-white flex items-center justify-center transition-all" style="width:0%">0%</div>
                        </div>
                        <p class="text-xs text-slate-400 mt-1 text-center">กำลังอัปโหลดรูป...</p>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium mb-1">รายละเอียด</label>
                    <textarea id="prod-desc" rows="3" class="w-full border rounded-xl px-3.5 py-2 text-sm focus:ring-2 focus:ring-blue-400"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" id="btn-save" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl text-sm shadow-md flex justify-center items-center gap-2"><i data-lucide="save" class="w-4 h-4"></i> บันทึก</button>
                    <button type="button" onclick="window.resetForm()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium py-2.5 px-3.5 rounded-xl text-sm">ยกเลิก</button>
                </div>
            </form>
        </div>

        <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
            <div class="p-5 border-b bg-slate-50 flex justify-between items-center">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="database" class="text-slate-600"></i> ข้อมูลเรียลไทม์</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead><tr class="bg-slate-50 text-slate-500 text-xs border-b"><th class="p-4 w-20">รูป</th><th class="p-4">รายละเอียด</th><th class="p-4">ราคา</th><th class="p-4 text-center">จัดการ</th></tr></thead>
                    <tbody id="admin-product-rows" class="divide-y text-sm"></tbody>
                </table>
                <div id="loading-state" class="p-12 text-center text-slate-400">กำลังโหลดข้อมูลจาก Cloud...</div>
            </div>
        </div>
    </main>

    <script type="module" src="js/admin.js"></script>
</body>
</html
