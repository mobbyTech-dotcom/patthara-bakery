<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภัทรา Homemade ✨ - ร้านเค้กโฮมเมดสุดละมุน</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Mitr', sans-serif; background-color: #FFF5F5; }
        .drawer-transition { transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .loader { border-top-color: #f43f5e; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="overflow-x-hidden text-gray-800">
    <nav class="sticky top-0 bg-white/80 backdrop-blur-md border-b border-rose-100 z-30 px-4 py-3 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-rose-200 rounded-full flex items-center justify-center text-rose-600 font-bold text-xl shadow-inner">🍰</div>
                <div>
                    <h1 class="text-xl font-bold text-rose-600 leading-tight">ภัทรา Homemade ✨</h1>
                    <p class="text-xs text-rose-400">Bakery from the heart</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="window.toggleCart(true)" class="relative bg-rose-500 hover:bg-rose-600 text-white p-2.5 rounded-full shadow-md transition-all active:scale-95">
                    <i data-lucide="shopping-basket" class="w-5 h-5"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-rose-600 border border-rose-500 font-bold text-xs w-5 h-5 rounded-full flex items-center justify-center shadow">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-b from-rose-100 to-rose-50/20 py-12 px-4 text-center">
        <div class="max-w-2xl mx-auto">
            <span class="bg-rose-100 text-rose-600 text-xs font-semibold px-3 py-1 rounded-full uppercase tracking-wider">Homemade & Premium</span>
            <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mt-3 mb-4">เมนูความอร่อย อบสดใหม่ด้วยใจ 🎂</h2>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10 min-h-[50vh]">
        <div id="loading-spinner" class="flex justify-center items-center py-20">
            <div class="w-12 h-12 border-4 border-rose-200 border-solid rounded-full loader"></div>
        </div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 hidden"></div>
    </main>

    <!-- Shopping Cart Drawer -->
    <div id="cart-drawer-overlay" onclick="window.toggleCart(false)" class="fixed inset-0 bg-black/40 backdrop-blur-xs z-40 hidden opacity-0 transition-opacity duration-300"></div>
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full sm:w-[420px] bg-white shadow-2xl z-50 drawer-transition transform translate-x-full flex flex-col rounded-l-2xl">
        <div class="p-5 border-b border-rose-100 flex justify-between items-center bg-rose-50/50 rounded-tl-2xl">
            <div class="flex items-center gap-2 text-rose-700">
                <i data-lucide="shopping-bag" class="w-5 h-5 text-rose-500"></i><h3 class="text-lg font-bold">ตะกร้าสินค้า</h3>
            </div>
            <button onclick="window.toggleCart(false)" class="p-2 text-gray-400 hover:text-gray-600 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-5 space-y-4"></div>
        <div class="p-5 border-t border-rose-100 bg-gray-50 rounded-bl-2xl">
            <div class="flex justify-between items-center mb-4"><span class="font-medium">ยอดรวมทั้งหมด:</span><span id="cart-total" class="text-2xl font-bold text-rose-600">฿0</span></div>
            <button onclick="window.openCheckoutModal()" id="btn-checkout" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 rounded-xl shadow-lg flex justify-center gap-2 disabled:opacity-50">
                <span>สั่งซื้อและนัดรับ</span><i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full max-h-[90vh] overflow-y-auto shadow-2xl p-6 relative">
            <button onclick="window.closeCheckoutModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-1.5"><i data-lucide="x" class="w-5 h-5"></i></button>
            <h3 class="text-xl font-bold mb-4">ข้อมูลจัดส่ง</h3>
            <form onsubmit="window.handleFormSubmit(event)" class="space-y-4">
                <div><label class="block text-sm font-medium mb-1">ชื่อ-นามสกุล *</label><input type="text" id="cust-name" required class="w-full border rounded-xl px-4 py-2.5"></div>
                <div><label class="block text-sm font-medium mb-1">เบอร์โทรศัพท์ *</label><input type="tel" id="cust-phone" required class="w-full border rounded-xl px-4 py-2.5"></div>
                <div><label class="block text-sm font-medium mb-1">วัน/เวลานัดรับ *</label><input type="datetime-local" id="cust-date" required class="w-full border rounded-xl px-4 py-2.5"></div>
                <div><label class="block text-sm font-medium mb-1">ที่อยู่เพิ่มเติม *</label><textarea id="cust-address" required rows="2" class="w-full border rounded-xl px-4 py-2.5"></textarea></div>
                <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-md mt-2">ออกใบออร์เดอร์</button>
            </form>
        </div>
    </div>

    <!-- Slip Modal -->
    <div id="slip-modal" class="fixed inset-0 bg-black/60 backdrop-blur-md z-50 hidden items-center justify-center p-4 overflow-y-auto">
        <div class="max-w-md w-full my-8">
            <div id="order-slip-card" class="bg-white rounded-2xl p-6 shadow-2xl border-4 border-rose-200 relative bg-[radial-gradient(#fff5f5_1px,transparent_1px)] [background-size:16px_16px]">
                <div class="text-center border-b border-dashed border-gray-300 pb-4 mb-4">
                    <h4 class="text-xl font-bold">ภัทรา Homemade ✨</h4>
                    <div class="mt-3 text-xs bg-rose-50 text-rose-700 font-mono py-1 px-3 rounded-full inline-block" id="slip-id">ORDER: #XXXX</div>
                </div>
                <div class="text-xs space-y-1.5 text-gray-600 border-b border-dashed border-gray-200 pb-3 mb-3">
                    <div class="flex"><span class="w-20 font-medium">ลูกค้า:</span> <span id="slip-cust-name" class="font-semibold"></span></div>
                    <div class="flex"><span class="w-20 font-medium">เบอร์โทร:</span> <span id="slip-cust-phone"></span></div>
                    <div class="flex"><span class="w-20 font-medium">เวลานัดรับ:</span> <span id="slip-cust-date" class="text-rose-600 font-semibold"></span></div>
                    <div class="flex"><span class="w-20 font-medium">ที่อยู่:</span> <span id="slip-cust-address" class="flex-1 break-words"></span></div>
                </div>
                <div class="text-xs mb-4">
                    <div id="slip-items" class="space-y-2 min-h-[40px]"></div>
                    <div class="flex justify-between font-bold text-sm border-t pt-2 mt-2">
                        <span>ยอดรวม</span><span id="slip-total" class="text-rose-600 text-base">฿0</span>
                    </div>
                </div>
                <div class="bg-rose-50/50 p-4 rounded-xl border border-rose-100 text-center flex flex-col items-center">
                    <p class="text-xs font-semibold text-rose-700 mb-2">สแกนจ่ายเงินผ่าน พร้อมเพย์</p>
                    <div class="bg-white p-2.5 rounded-lg border shadow-sm"><img id="promptpay-qr-img" src="" class="w-44 h-44"></div>
                </div>
            </div>
            <div class="mt-5 space-y-2.5">
                <button onclick="window.downloadSlipImage()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 rounded-xl shadow-lg">บันทึกใบออร์เดอร์</button>
                <button onclick="window.closeAllModalsAndClear()" class="w-full bg-gray-200 text-gray-700 font-medium py-2.5 rounded-xl text-sm">กลับสู่หน้าแรก</button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script type="module" src="js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
