<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ภัทรา Homemade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Mitr', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-slate-800 rounded-2xl mx-auto flex items-center justify-center text-white mb-4 shadow-lg"><i data-lucide="lock" class="w-8 h-8"></i></div>
            <h2 class="text-2xl font-bold text-slate-800">ระบบจัดการร้าน</h2>
            <p class="text-sm text-slate-500 mt-1">กรุณาล็อกอินเพื่อเข้าสู่หลังบ้าน</p>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">อีเมล</label>
                <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-slate-800 outline-none" placeholder="admin@example.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
                <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-slate-800 outline-none" placeholder="••••••••">
            </div>
            <button type="submit" id="login-btn" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition-all shadow-md mt-2 flex justify-center gap-2">
                <span>เข้าสู่ระบบ</span><i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
            <p id="error-msg" class="text-red-500 text-sm text-center hidden mt-2">อีเมลหรือรหัสผ่านไม่ถูกต้อง!</p>
        </form>
        <div class="mt-6 text-center"><a href="index.html" class="text-sm text-slate-500 hover:text-slate-800">&larr; กลับหน้าร้านค้า</a></div>
    </div>
    
    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.innerHTML = `<div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>`;
            btn.disabled = true;
            
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                window.location.href = 'admin.html';
            } catch (error) {
                document.getElementById('error-msg').classList.remove('hidden');
                btn.innerHTML = `<span>เข้าสู่ระบบ</span><i data-lucide="arrow-right" class="w-5 h-5"></i>`;
                btn.disabled = false;
            }
        });
        lucide.createIcons();
    </script>
</body>
</html>
